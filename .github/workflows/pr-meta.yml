name: PR Metadata

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  assign-and-request-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Assign author and request reviewer
        uses: actions/github-script@v7
        with:
          script: |
            const members = ['Kimgyuilli', 'youtheyeon'];
            const { owner, repo } = context.repo;
            const pullRequest = context.payload.pull_request;
            const author = pullRequest.user.login;
            const issue_number = pullRequest.number;

            const normalizedAuthor = author.toLowerCase();
            const reviewer = members.find(
              (member) => member.toLowerCase() !== normalizedAuthor
            );

            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number,
              assignees: [author],
            });

            if (!reviewer) {
              core.info(`No reviewer found for PR author: ${author}`);
              return;
            }

            await github.rest.pulls.requestReviewers({
              owner,
              repo,
              pull_number: issue_number,
              reviewers: [reviewer],
            });

      - name: Copy labels from linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pullRequest = context.payload.pull_request;
            const body = pullRequest.body ?? '';
            const issueNumbers = [
              ...body.matchAll(
                /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi
              ),
            ].map((match) => Number(match[1]));

            const uniqueIssueNumbers = [...new Set(issueNumbers)];

            if (uniqueIssueNumbers.length === 0) {
              core.info('No linked issues found in PR body.');
              return;
            }

            const labels = new Set();

            for (const issue_number of uniqueIssueNumbers) {
              const { data: issue } = await github.rest.issues.get({
                owner,
                repo,
                issue_number,
              });

              for (const label of issue.labels) {
                labels.add(typeof label === 'string' ? label : label.name);
              }
            }

            if (labels.size === 0) {
              core.info('Linked issues have no labels.');
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pullRequest.number,
              labels: [...labels],
            });
