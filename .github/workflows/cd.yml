name: CD

on:
  push:
    branches:
      - 32-chore/cd

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Build Spring Boot jar
        run: ./gradlew clean bootJar

      - name: Clean old jar on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            APP_DIR=/home/ubuntu/app

            mkdir -p "$APP_DIR"
            rm -f "$APP_DIR"/*.jar

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: build/libs/*.jar
          target: /home/ubuntu/app
          strip_components: 2

      - name: Deploy jar on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DB_HOST,DB_PORT,DB_NAME,DB_USERNAME,DB_PASSWORD,S3_BUCKET,AWS_REGION
          script: |
            APP_DIR=/home/ubuntu/app
            LOG_FILE=/home/ubuntu/app.log
            PID_FILE=/home/ubuntu/app.pid

            if [ -f "$PID_FILE" ]; then
              OLD_PID=$(cat "$PID_FILE")
              if ps -p "$OLD_PID" > /dev/null 2>&1; then
                kill "$OLD_PID"
                sleep 5
              fi
              rm -f "$PID_FILE"
            fi

            if sudo lsof -i :8080 > /dev/null 2>&1; then
              sudo fuser -k 8080/tcp
              sleep 5
            fi

            JAR_PATH=$(ls -t "$APP_DIR"/*.jar | head -n 1)

            echo "Deploying jar: $JAR_PATH"

            nohup java -jar "$JAR_PATH" --spring.profiles.active=prod > "$LOG_FILE" 2>&1 &

            echo $! > "$PID_FILE"

            sleep 10

            curl --fail --retry 10 --retry-delay 3 http://localhost:8080/api/v1/health
            tail -n 50 "$LOG_FILE"
