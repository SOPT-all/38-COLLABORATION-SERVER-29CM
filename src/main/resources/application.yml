spring:
  application:
    name: collaboration-server-29cm
  profiles:
    default: local

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /api/v1
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

cloud:
  aws:
    region:
      static: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${S3_BUCKET}

aws:
  s3:
    presigned-url-expiration: 3600

springdoc:
  swagger-ui:
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    try-it-out-enabled: true
